<script type="text/javascript">

const toggle = document.getElementById('darkModeToggle');
const htmlElement = document.documentElement;

// Function to apply theme
const applyTheme = (theme) => {
    htmlElement.setAttribute('data-bs-theme', theme);
    toggle.checked = (theme === 'dark');
};

// Initial Load: Check localStorage, then OS preference
const savedTheme = localStorage.getItem('theme');
const systemDarkMode = window.matchMedia('(prefers-color-scheme: dark)');

if (savedTheme) {
    applyTheme(savedTheme);
} else {
    applyTheme(systemDarkMode.matches ? 'dark' : 'light');
}

// Manual Toggle: Save choice to localStorage
toggle.addEventListener('change', () => {
    const newTheme = toggle.checked ? 'dark' : 'light';
    applyTheme(newTheme);
    localStorage.setItem('theme', newTheme);
});

// System Change: Update only if user hasn't set a manual preference
systemDarkMode.addEventListener('change', (e) => {
    if (!localStorage.getItem('theme')) {
        applyTheme(e.matches ? 'dark' : 'light');
    }
});

</script>

<script>
  const form = document.getElementById('contact-form');
  
  // Debug: This will show in your console if the ID is missing
  const envId = '{{ site.formbricks_environment_id }}';
  if (!envId) console.error("Formbricks Error: Environment ID is missing from Jekyll config!");

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(form);
    const formValues = Object.fromEntries(formData);

    try {
      const response = await fetch(`https://app.formbricks.com/api/v1/client/{{ site.formbricks_environment_id }}/responses`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Accept': 'application/json' 
        },
        body: JSON.stringify({
          surveyId: '{{ site.formbricks_form_id }}',
          meta: {action: 'Website Form', source: '{{ page.title }}', url: '{{ site.url }}{{ page.url }}'},
          finished: true,
          data: formValues // Must be 'data'
        }),
      });

      if (response.ok) {
        alert('Success! Thank you for reaching out. I look forward to connecting with you.');
        form.reset();
      } else {
        console.error('Submission Failed:', await response.text());
      }
    } catch (err) {
      console.error('Network/CORS Error:', err);
    }
  });
</script>
